name: Generate Wall of Honour

on:
  schedule:
    - cron: '0 6 1 * *'      # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wall-of-honour
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate
        run: python -m scripts.generate_wall_of_honour
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: BHoM
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain profile/README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore(wall): refresh wall of honour"
            git push
          else
            echo "No changes; wall is already current."
          fi
