name: Test scripts

on:
  push:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/test-scripts.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/test-scripts.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest scripts/tests -v
